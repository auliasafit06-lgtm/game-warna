<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Mengenali Warna (Timer + High Score)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        .instruction {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .stats-container {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #444;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        #timer {
            color: #e74c3c;
        }
        #word-display {
            font-size: 48px;
            font-weight: 900;
            margin: 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-height: 60px;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
        .btn:active {
            transform: scale(0.97);
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            min-height: 25px;
        }
        /* Overlay Game Over */
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .overlay h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        .start-btn {
            background-color: #2ecc71;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="game-over-screen" class="overlay">
            <h2 id="overlay-title">Tebak Warna!</h2>
            <p id="final-score-text">Uji seberapa fokus mata dan otakmu.</p>
            <p id="high-score-text">High Score: <span id="high-score-val">0</span></p>
            <button class="start-btn" onclick="startGame()">Mulai Main</button>
        </div>

        <h1>Tebak Warna!</h1>
        <p class="instruction">PILIH WARNA TULISANNYA, BUKAN MEMBACA TEKSNYA!</p>
        
        <div class="stats-container">
            <div>Waktu: <span id="timer">30</span>s</div>
            <div>Skor: <span id="score">0</span></div>
        </div>
        
        <div id="word-display">...</div>
        
        <div class="options-container">
            <button class="btn" style="background-color: #e74c3c;" onclick="checkAnswer('MERAH')">MERAH</button>
            <button class="btn" style="background-color: #3498db;" onclick="checkAnswer('BIRU')">BIRU</button>
            <button class="btn" style="background-color: #2ecc71;" onclick="checkAnswer('HIJAU')">HIJAU</button>
            <button class="btn" style="background-color: #f1c40f;" onclick="checkAnswer('KUNING')">KUNING</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const colors = [
            { name: 'MERAH', hex: '#e74c3c' },
            { name: 'BIRU', hex: '#3498db' },
            { name: 'HIJAU', hex: '#2ecc71' },
            { name: 'KUNING', hex: '#f1c40f' }
        ];

        let score = 0;
        let timeLeft = 30;
        let correctColorName = "";
        let timerInterval;
        let gameActive = false;

        // Ambil High Score dari memori browser (Local Storage)
        let highScore = localStorage.getItem('colorGameHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        // Menampilkan layar awal saat pertama buka
        document.getElementById('game-over-screen').style.display = 'flex';

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('message').innerText = "";
            
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextQuestion() {
            if (!gameActive) return;
            const randomTextIndex = Math.floor(Math.random() * colors.length);
            const randomColorIndex = Math.floor(Math.random() * colors.length);

            const displayWord = document.getElementById('word-display');
            displayWord.innerText = colors[randomTextIndex].name;
            displayWord.style.color = colors[randomColorIndex].hex;

            correctColorName = colors[randomColorIndex].name;
        }

        function checkAnswer(selectedColor) {
            if (!gameActive) return;
            const messageElement = document.getElementById('message');
            
            if (selectedColor === correctColorName) {
                score += 10;
                messageElement.innerText = "🎉 Benar! +10";
                messageElement.style.color = "#2ecc71";
            } else {
                score = Math.max(0, score - 5);
                messageElement.innerText = `❌ Salah! Itu warna ${correctColorName}`;
                messageElement.style.color = "#e74c3c";
            }

            document.getElementById('score').innerText = score;
            nextQuestion();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            
            // Cek dan simpan High Score baru
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('colorGameHighScore', highScore);
            }

            // Tampilkan layar Game Over
            document.getElementById('overlay-title').innerText = "Waktu Habis! ⏱️";
            document.getElementById('final-score-text').innerText = `Skor Akhir Kamu: ${score}`;
            document.getElementById('high-score-val').innerText = highScore;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
    </script>

</body>
</html>
